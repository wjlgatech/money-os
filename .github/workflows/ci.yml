name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f README.md
          test -f ROADMAP.md
          test -f ARCHITECTURE.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f LICENSE
