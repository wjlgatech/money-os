<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money OS — Freedom Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    color: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    width: 480px;
    padding: 48px 40px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(99, 179, 237, 0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(99, 179, 237, 0.6);
    margin-bottom: 24px;
  }

  .progress-ring-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 24px;
  }

  .progress-ring {
    width: 200px;
    height: 200px;
  }

  .progress-ring circle {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
  }

  .ring-bg {
    stroke: rgba(255, 255, 255, 0.06);
  }

  .ring-fill {
    stroke: url(#ringGradient);
    transform: rotate(-90deg);
    transform-origin: center;
    /* TEMPLATE: stroke-dasharray and stroke-dashoffset calculated from percentage */
    stroke-dasharray: 565.48;
    stroke-dashoffset: 327.98; /* 565.48 * (1 - 0.42) for 42% */
    transition: stroke-dashoffset 1.5s ease-out;
  }

  .ring-percentage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, #63b3ed, #4fd1c5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .ring-label {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
    white-space: nowrap;
  }

  .metrics {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 24px 0;
  }

  .metric {
    text-align: center;
  }

  .metric-value {
    font-size: 22px;
    font-weight: 700;
    color: #e8e8e8;
  }

  .metric-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tagline {
    font-size: 15px;
    color: rgba(99, 179, 237, 0.7);
    font-style: italic;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    line-height: 1.5;
  }

  .brand {
    margin-top: 20px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Freedom Progress</div>

  <div class="progress-ring-container">
    <svg class="progress-ring" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#63b3ed" />
          <stop offset="100%" stop-color="#4fd1c5" />
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="100" cy="100" r="90" />
      <circle class="ring-fill" cx="100" cy="100" r="90" />
    </svg>
    <div class="ring-percentage">42%</div>
    <div class="ring-label">to financial freedom</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-value">$4,200</div>
      <div class="metric-label">Monthly Target</div>
    </div>
    <div class="metric">
      <div class="metric-value">8.3 yrs</div>
      <div class="metric-label">Estimated</div>
    </div>
  </div>

  <div class="tagline">Financial freedom is when work becomes a choice,<br>not a requirement.</div>

  <div class="brand">Money OS</div>
</div>
</body>
</html>
