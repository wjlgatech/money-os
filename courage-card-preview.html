<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money OS — Courage Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    color: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    width: 480px;
    padding: 48px 40px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(183, 148, 244, 0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(183, 148, 244, 0.6);
    margin-bottom: 32px;
  }

  .journey {
    position: relative;
    margin: 0 auto 32px;
  }

  .from-state {
    font-size: 20px;
    color: rgba(255, 255, 255, 0.35);
    font-style: italic;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .from-state::before {
    content: '\201C';
    font-size: 36px;
    color: rgba(183, 148, 244, 0.3);
    display: block;
    margin-bottom: -8px;
  }

  .arrow {
    display: block;
    margin: 16px auto;
    width: 2px;
    height: 40px;
    background: linear-gradient(180deg, rgba(183, 148, 244, 0.2), rgba(99, 179, 237, 0.4));
    position: relative;
  }

  .arrow::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid rgba(99, 179, 237, 0.4);
  }

  .to-state {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 8px;
  }

  .hero-number {
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(135deg, #b794f4, #63b3ed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin: 8px 0;
  }

  .hero-context {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.4);
  }

  .tagline {
    font-size: 16px;
    color: rgba(183, 148, 244, 0.7);
    font-style: italic;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    line-height: 1.5;
  }

  .brand {
    margin-top: 20px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Courage Moment</div>

  <div class="journey">
    <div class="from-state">I'll never get out of debt</div>

    <span class="arrow"></span>

    <div class="to-state">A clear plan and a real number:</div>
    <div class="hero-number">$4,200/mo</div>
    <div class="hero-context">Freedom Number — in 8.3 years</div>
  </div>

  <div class="tagline">The hardest step is the first one. I took it.</div>

  <div class="brand">Money OS</div>
</div>
</body>
</html>
